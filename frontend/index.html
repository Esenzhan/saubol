<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SauBol</title>
    <script>
      (function () {
        var stored = localStorage.getItem("theme");
        var isNight = stored ? stored === "night" : window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (isNight) document.documentElement.classList.add("dark");
        document.addEventListener("DOMContentLoaded", function () {
          var meta = document.getElementById("theme-color-meta");
          if (meta) meta.setAttribute("content", isNight ? "#0d1614" : "#eeede2");
        });
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!--
      Driven by the app's own theme toggle (localStorage "theme"), not the
      prefers-color-scheme media query — those are independent and a user
      whose phone is in light mode but toggled SauBol to night mode would
      otherwise get a stuck-white status bar. Kept in sync by theme.jsx.
    -->
    <meta id="theme-color-meta" name="theme-color" content="#eeede2" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SauBol" />
  </head>
  <body class="bg-paper text-ink font-body">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
